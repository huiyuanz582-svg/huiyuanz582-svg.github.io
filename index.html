<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zhang Huiyuan · PhD candidate</title>
  <style>
    /* 极简重置 + 居中 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 2rem 1.5rem;
      line-height: 1.6;
      color: #1e293b;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: #ffffff;
      border-radius: 28px;
      padding: 3rem 2.8rem;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04), 0 2px 8px rgba(0, 0, 0, 0.02);
      border: 1px solid #eef2f6;
      transition: all 0.2s;
    }

    /* 单段介绍：干净、易读 */
    .bio {
      font-size: 1.2rem;
      font-weight: 400;
      color: #1f3a4e;
      letter-spacing: -0.01em;
    }

    .bio strong {
      color: #0b2b3d;
      font-weight: 600;
    }

    .bio .highlight {
      display: inline-block;
      background: #e6f0fa;
      padding: 0.1rem 0.6rem;
      border-radius: 30px;
      font-weight: 500;
      color: #13415a;
    }

    /* 小点缀：GitHub 链接 + 邮箱 */
    .footer-links {
      margin-top: 2rem;
      padding-top: 1.2rem;
      border-top: 1px solid #eef2f6;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #4b6f89;
    }

    .footer-links a {
      color: #1a4b6d;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px dotted #c7d8e8;
    }

    .footer-links a:hover {
      color: #0a2b40;
      border-bottom: 1px solid #1a4b6d;
    }

    .footer-links span {
      background: #f0f5fc;
      padding: 0.2rem 1rem;
      border-radius: 40px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem;
      }
      .bio {
        font-size: 1.05rem;
      }
      .footer-links {
        flex-direction: column;
        gap: 0.8rem;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- 核心：一段简洁的介绍，姓名已更新为 Zhang Huiyuan -->
    <p class="bio">
      I am <strong>Zhang Huiyuan</strong>, a <strong>Ph.D. candidate</strong> at the 
      <strong>Beijing Institute of Technology</strong> (Automation School), 
      specializing in <span class="highlight">3D point cloud denoising</span>. 
      I received my M.S. degree from 
      <strong>Northeastern University</strong> (Automation School).
    </p>

    <!-- 极简脚注：联系方式 + GitHub -->
    <div class="footer-links">
      <span>📧 huiyuan.zhang@bit.edu.cn</span>
      <a href="#" target="_blank">GitHub</a>
    </div>
  </div>
</body>
</html>
